<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bagan Fase Gugur Piala Dunia 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    
    /* Scrollbar Modern yang Halus */
    .scroll-container::-webkit-scrollbar { height: 6px; }
    .scroll-container::-webkit-scrollbar-track { background: transparent; }
    .scroll-container::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    .scroll-container::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    
    .scroll-container { cursor: grab; }
    .scroll-container:active { cursor: grabbing; }

    /* Menyembunyikan ikon panah default select */
    select { appearance: none; -webkit-appearance: none; -moz-appearance: none; }
    select option { color: #1f2937; background: #ffffff; }
  </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">
  <div id="app" class="flex flex-col min-h-screen w-full">
    
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
      <div class="max-w-[1400px] mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-inner">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
          <div class="text-xl font-bold tracking-tight text-gray-900">Piala Dunia <span class="font-light text-gray-500">2026</span></div>
        </div>
        <button @click="resetData" class="text-xs font-medium bg-red-50 text-red-600 hover:bg-red-100 hover:text-red-700 px-4 py-2 rounded-full transition-colors border border-red-100">
          Reset Simulasi
        </button>
      </div>
    </header>

    <main class="flex-grow flex flex-col w-full">
      <div class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 py-3 shadow-sm z-40 sticky top-16">
        <div class="flex justify-center gap-3 max-w-3xl mx-auto">
          <button v-for="tab in tabs" :key="tab.id" 
                  @click="activeTab = tab.id"
                  :disabled="!canAccessTab(tab.id)"
                  :class="['px-6 py-2 rounded-full text-sm font-semibold transition-all duration-300', 
                           activeTab === tab.id ? 'bg-gray-900 text-white shadow-md' : 
                           canAccessTab(tab.id) ? 'bg-gray-100 text-gray-600 hover:bg-gray-200' : 'bg-gray-50 text-gray-400 cursor-not-allowed border border-gray-100']">
            {{ tab.label }}
          </button>
        </div>
      </div>

      <div v-if="activeTab === 'grup'" class="max-w-[1400px] mx-auto p-4 sm:p-8 w-full animate-fade-in flex-grow">
        <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-5 mb-8 flex flex-col sm:flex-row items-center justify-between shadow-sm">
          <div class="mb-4 sm:mb-0">
            <h2 class="text-blue-900 font-bold text-lg">Pilih 32 Negara</h2>
            <p class="text-blue-700/80 text-sm mt-1">Pilih tim yang berhak melaju dari fase grup ke babak gugur.</p>
          </div>
          <div class="flex items-center gap-4">
            <div class="bg-white px-4 py-2 rounded-xl shadow-sm border border-blue-50">
              <span :class="selectedTeams.length === 32 ? 'text-green-600' : 'text-blue-600'" class="font-bold text-lg">{{ selectedTeams.length }}</span>
              <span class="text-gray-400 text-sm font-medium">/32</span>
            </div>
            <button @click="goToBagan" :disabled="selectedTeams.length !== 32"
                    :class="['px-6 py-3 text-sm rounded-xl font-bold transition-all', selectedTeams.length === 32 ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-lg shadow-blue-600/20' : 'bg-gray-200 text-gray-400 cursor-not-allowed']">
              Lanjut &rarr;
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
          <div v-for="grup in groupsData" :key="grup.grup" class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-shadow">
            <h3 class="font-bold text-gray-800 text-lg mb-4 flex items-center gap-2">
              <span class="w-6 h-6 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center text-xs font-black">G</span>
              Grup {{ grup.grup }}
            </h3>
            <div class="space-y-3">
              <label v-for="negara in grup.negara" :key="negara" class="flex items-center space-x-3 cursor-pointer group p-2 rounded-lg hover:bg-gray-50 transition-colors">
                <input type="checkbox" :value="negara" v-model="selectedTeams" :disabled="selectedTeams.length >= 32 && !selectedTeams.includes(negara)"
                       class="w-5 h-5 rounded-[4px] border-gray-300 text-blue-600 focus:ring-blue-500 disabled:opacity-50 accent-blue-600 transition-all">
                <img :src="getFlag(negara)" alt="flag" class="w-6 h-4 object-cover rounded-[2px] shadow-sm border border-gray-100/50">
                <span class="text-gray-700 group-hover:text-gray-900 font-medium text-sm transition-colors">{{ negara }}</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <div v-if="activeTab === 'bagan'" class="flex-grow w-full bg-[#f8fafc] overflow-hidden flex flex-col relative">
        <div class="absolute bottom-4 right-4 z-10 bg-white/90 backdrop-blur px-4 py-2 border border-gray-200 rounded-full shadow-lg text-[11px] text-gray-500 font-medium flex items-center gap-2 pointer-events-none">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
          Geser untuk melihat
        </div>
        
        <div id="scroll-container" class="scroll-container overflow-x-auto overflow-y-hidden w-full h-full flex-grow pt-8 pb-16 px-4 md:px-12">
          <div class="flex w-max min-w-full items-center">
            
            <template v-for="(round, rIndex) in roundsKeys" :key="round">
              
              <div class="flex-none flex flex-col w-[210px]">
                <div v-for="(match, mIndex) in bracket[round]" :key="match.id" 
                     class="flex flex-col justify-center relative w-full"
                     :style="{ height: (84 * Math.pow(2, rIndex)) + 'px' }">
                  
                  <div class="absolute text-[10px] text-gray-400 font-medium text-center w-full"
                       :style="{ top: 'calc(50% - 40px)' }">
                    29 Jun • 0{{ 3 + (mIndex % 6) }}:00
                  </div>

                  <div class="h-[64px] w-full bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition-shadow flex flex-col overflow-hidden relative z-10">
                    
                    <div class="absolute -left-1.5 top-0 bottom-0 w-1.5 bg-gray-200"></div>
                    <div class="absolute -left-8 top-1/2 transform -translate-y-1/2 text-[9px] bg-gray-100 text-gray-500 px-1 rounded-sm font-bold tracking-wider">
                      M{{ match.id }}
                    </div>

                    <div class="flex-1 flex items-center px-2.5 border-b border-gray-100 relative transition-colors" :class="isWinner(round, mIndex, match.team1) ? 'bg-blue-50/50' : ''">
                      <div class="w-3.5 h-3.5 mr-2 rounded-full border flex items-center justify-center transition-colors"
                           :class="isWinner(round, mIndex, match.team1) ? 'bg-blue-600 border-blue-600' : 'border-gray-300'">
                         <svg v-if="isWinner(round, mIndex, match.team1)" class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                      </div>
                      
                      <img v-if="match.team1" :src="getFlag(match.team1)" class="w-[18px] h-[13px] mr-2.5 object-cover rounded-[2px] shadow-sm border border-gray-100" />
                      <div v-else class="w-[18px] h-[13px] mr-2.5 bg-gray-100 rounded-[2px]"></div>
                      
                      <select v-model="match.team1" @change="handleChange(round, mIndex)" class="w-full bg-transparent text-[13px] outline-none font-semibold cursor-pointer truncate" :class="match.team1 ? 'text-gray-800' : 'text-gray-400 font-normal'">
                        <option value="" class="text-gray-400 italic">Pilih Tim</option>
                        <option v-for="t in getOptions(round, mIndex, true)" :key="t" :value="t">{{ t }}</option>
                      </select>
                    </div>

                    <div class="flex-1 flex items-center px-2.5 relative transition-colors" :class="isWinner(round, mIndex, match.team2) ? 'bg-blue-50/50' : ''">
                      <div class="w-3.5 h-3.5 mr-2 rounded-full border flex items-center justify-center transition-colors"
                           :class="isWinner(round, mIndex, match.team2) ? 'bg-blue-600 border-blue-600' : 'border-gray-300'">
                         <svg v-if="isWinner(round, mIndex, match.team2)" class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                      </div>
                      
                      <img v-if="match.team2" :src="getFlag(match.team2)" class="w-[18px] h-[13px] mr-2.5 object-cover rounded-[2px] shadow-sm border border-gray-100" />
                      <div v-else class="w-[18px] h-[13px] mr-2.5 bg-gray-100 rounded-[2px]"></div>

                      <select v-model="match.team2" @change="handleChange(round, mIndex)" class="w-full bg-transparent text-[13px] outline-none font-semibold cursor-pointer truncate" :class="match.team2 ? 'text-gray-800' : 'text-gray-400 font-normal'">
                        <option value="" class="text-gray-400 italic">Pilih Tim</option>
                        <option v-for="t in getOptions(round, mIndex, false)" :key="t" :value="t">{{ t }}</option>
                      </select>
                    </div>

                  </div>
                </div>
              </div>

              <div v-if="rIndex < roundsKeys.length - 1" class="flex-none flex flex-col w-[32px]">
                <div v-for="i in (bracket[round].length / 2)" :key="'conn-'+i" 
                     class="flex items-center justify-start relative w-full"
                     :style="{ height: (84 * Math.pow(2, rIndex + 1)) + 'px' }">
                  <div class="w-1/2 border-y-[1.5px] border-r-[1.5px] border-gray-300 rounded-r-lg"
                       :style="{ height: (84 * Math.pow(2, rIndex)) + 'px' }"></div>
                  <div class="w-1/2 h-0 border-t-[1.5px] border-gray-300"></div>
                </div>
              </div>
              
            </template>

            <div class="flex-none flex flex-col w-[190px] justify-center ml-2 relative">
               <div class="absolute left-0 top-1/2 w-4 h-0 border-t-[1.5px] border-gray-300 transform -translate-x-full"></div>
               <div class="bg-gradient-to-b from-[#111827] to-[#1f2937] border border-gray-700 rounded-2xl shadow-2xl p-4 text-center transform hover:scale-105 transition-transform">
                 <div class="text-yellow-500 text-[10px] font-black uppercase tracking-widest mb-3 flex items-center justify-center gap-1">
                   <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                   Juara Dunia
                 </div>
                 
                 <div class="flex justify-center mb-3">
                   <img v-if="bracket.champion" :src="getFlag(bracket.champion)" class="w-12 h-8 object-cover rounded shadow-md border border-gray-600" />
                   <div v-else class="w-12 h-8 bg-gray-800 rounded border border-gray-700 flex items-center justify-center">
                     <span class="text-gray-500 text-xs">?</span>
                   </div>
                 </div>

                 <select v-model="bracket.champion" :disabled="!bracket.final[0].team1 || !bracket.final[0].team2"
                         class="w-full bg-transparent text-sm text-center outline-none font-bold text-white cursor-pointer appearance-none truncate px-2">
                    <option value="" class="text-gray-500 bg-white">Pilih Pemenang</option>
                    <option v-if="bracket.final[0].team1" :value="bracket.final[0].team1" class="text-gray-800 bg-white">{{ bracket.final[0].team1 }}</option>
                    <option v-if="bracket.final[0].team2" :value="bracket.final[0].team2" class="text-gray-800 bg-white">{{ bracket.final[0].team2 }}</option>
                 </select>
               </div>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref, onMounted, watch } = Vue;

    createApp({
      setup() {
        // Data Negara & Peta Kode ISO Bendera (flagcdn.com)
        const groupsData = [
          { grup: "A", negara: ["Meksiko", "Afrika Selatan", "Korea Selatan", "Republik Ceko"] },
          { grup: "B", negara: ["Kanada", "Bosnia dan Herzegovina", "Qatar", "Swiss"] },
          { grup: "C", negara: ["Brasil", "Maroko", "Haiti", "Skotlandia"] },
          { grup: "D", negara: ["Amerika Serikat", "Paraguay", "Australia", "Turki"] },
          { grup: "E", negara: ["Jerman", "Curaçao", "Pantai Gading", "Ekuador"] },
          { grup: "F", negara: ["Belanda", "Jepang", "Swedia", "Tunisia"] },
          { grup: "G", negara: ["Belgia", "Mesir", "Iran", "Selandia Baru"] },
          { grup: "H", negara: ["Spanyol", "Tanjung Verde", "Arab Saudi", "Uruguay"] },
          { grup: "I", negara: ["Prancis", "Senegal", "Irak", "Norwegia"] },
          { grup: "J", negara: ["Argentina", "Aljazair", "Austria", "Yordania"] },
          { grup: "K", negara: ["Portugal", "Rep. Dem. Kongo", "Uzbekistan", "Kolombia"] },
          { grup: "L", negara: ["Inggris", "Kroasia", "Ghana", "Panama"] }
        ];

        const flagCodes = {
          "Meksiko": "mx", "Afrika Selatan": "za", "Korea Selatan": "kr", "Republik Ceko": "cz",
          "Kanada": "ca", "Bosnia dan Herzegovina": "ba", "Qatar": "qa", "Swiss": "ch",
          "Brasil": "br", "Maroko": "ma", "Haiti": "ht", "Skotlandia": "gb-sct",
          "Amerika Serikat": "us", "Paraguay": "py", "Australia": "au", "Turki": "tr",
          "Jerman": "de", "Curaçao": "cw", "Pantai Gading": "ci", "Ekuador": "ec",
          "Belanda": "nl", "Jepang": "jp", "Swedia": "se", "Tunisia": "tn",
          "Belgia": "be", "Mesir": "eg", "Iran": "ir", "Selandia Baru": "nz",
          "Spanyol": "es", "Tanjung Verde": "cv", "Arab Saudi": "sa", "Uruguay": "uy",
          "Prancis": "fr", "Senegal": "sn", "Irak": "iq", "Norwegia": "no",
          "Argentina": "ar", "Aljazair": "dz", "Austria": "at", "Yordania": "jo",
          "Portugal": "pt", "Rep. Dem. Kongo": "cd", "Uzbekistan": "uz", "Kolombia": "co",
          "Inggris": "gb-eng", "Kroasia": "hr", "Ghana": "gh", "Panama": "pa"
        };

        const getFlag = (teamName) => {
          const code = flagCodes[teamName];
          return code ? `https://flagcdn.com/w40/${code}.png` : '';
        };

        const tabs = [
          { id: 'grup', label: '1. Pilih Peserta' },
          { id: 'bagan', label: '2. Bagan Turnamen' }
        ];
        
        const activeTab = ref('grup');
        const selectedTeams = ref([]);
        const roundsKeys = ['r32', 'r16', 'r8', 'r4', 'final'];
        
        const defaultBracket = {
          r32: Array.from({length: 16}, (_, i) => ({ id: i+73, team1: '', team2: '' })),
          r16: Array.from({length: 8}, (_, i) => ({ id: i+89, team1: '', team2: '' })),
          r8:  Array.from({length: 4}, (_, i) => ({ id: i+97, team1: '', team2: '' })),
          r4:  Array.from({length: 2}, (_, i) => ({ id: i+101, team1: '', team2: '' })),
          final: Array.from({length: 1}, (_, i) => ({ id: 104, team1: '', team2: '' })),
          champion: ''
        };
        const bracket = ref(JSON.parse(JSON.stringify(defaultBracket)));

        // Local Storage dengan prefix unik versi UI baru agar tidak bentrok dengan sisa cache lama
        onMounted(() => {
          try {
            const savedTeams = localStorage.getItem('wc_v3_teams');
            if (savedTeams) selectedTeams.value = JSON.parse(savedTeams);
            const savedBracket = localStorage.getItem('wc_v3_bracket');
            if (savedBracket) bracket.value = JSON.parse(savedBracket);
            const savedTab = localStorage.getItem('wc_v3_tab');
            if (savedTab) activeTab.value = savedTab;
          } catch (e) { console.error("Error memuat localStorage", e); }
          initDragToScroll();
        });

        watch(selectedTeams, (val) => localStorage.setItem('wc_v3_teams', JSON.stringify(val)), { deep: true });
        watch(bracket, (val) => localStorage.setItem('wc_v3_bracket', JSON.stringify(val)), { deep: true });
        watch(activeTab, (val) => localStorage.setItem('wc_v3_tab', val));

        const resetData = () => {
          if(confirm("Yakin ingin mereset simulasi? Semua data bagan akan terhapus.")) {
            localStorage.removeItem('wc_v3_teams');
            localStorage.removeItem('wc_v3_bracket');
            localStorage.removeItem('wc_v3_tab');
            location.reload();
          }
        };

        const canAccessTab = (tabId) => tabId === 'grup' || selectedTeams.value.length === 32;
        const goToBagan = () => { if (selectedTeams.value.length === 32) activeTab.value = 'bagan'; };

        const getOptions = (round, index, isTeam1) => {
          if (round === 'r32') {
            const currentSelected = isTeam1 ? bracket.value.r32[index].team1 : bracket.value.r32[index].team2;
            const used = new Set();
            bracket.value.r32.forEach(m => {
              if (m.team1) used.add(m.team1);
              if (m.team2) used.add(m.team2);
            });
            return selectedTeams.value.filter(t => !used.has(t) || t === currentSelected).sort();
          }

          let prevRound;
          if (round === 'r16') prevRound = 'r32';
          else if (round === 'r8') prevRound = 'r16';
          else if (round === 'r4') prevRound = 'r8';
          else if (round === 'final') prevRound = 'r4';

          const prevIndex = index * 2 + (isTeam1 ? 0 : 1);
          const prevMatch = bracket.value[prevRound][prevIndex];
          return [prevMatch.team1, prevMatch.team2].filter(t => t);
        };

        const handleChange = (currentRound, matchIndex) => {
          let nextRound, nextIndex, isTeam1ForNext;
          
          if (currentRound === 'r32') { nextRound = 'r16'; nextIndex = Math.floor(matchIndex / 2); isTeam1ForNext = matchIndex % 2 === 0; }
          else if (currentRound === 'r16') { nextRound = 'r8'; nextIndex = Math.floor(matchIndex / 2); isTeam1ForNext = matchIndex % 2 === 0; }
          else if (currentRound === 'r8') { nextRound = 'r4'; nextIndex = Math.floor(matchIndex / 2); isTeam1ForNext = matchIndex % 2 === 0; }
          else if (currentRound === 'r4') { nextRound = 'final'; nextIndex = 0; isTeam1ForNext = matchIndex % 2 === 0; }
          else if (currentRound === 'final') { bracket.value.champion = ''; return; }

          if (nextRound) {
            if (isTeam1ForNext) bracket.value[nextRound][nextIndex].team1 = '';
            else bracket.value[nextRound][nextIndex].team2 = '';
            handleChange(nextRound, nextIndex);
          }
        };

        const isWinner = (round, index, teamName) => {
          if (!teamName) return false;
          let nextRound, nextIndex;
          
          if (round === 'r32') { nextRound = 'r16'; nextIndex = Math.floor(index / 2); }
          else if (round === 'r16') { nextRound = 'r8'; nextIndex = Math.floor(index / 2); }
          else if (round === 'r8') { nextRound = 'r4'; nextIndex = Math.floor(index / 2); }
          else if (round === 'r4') { nextRound = 'final'; nextIndex = 0; }
          else if (round === 'final') { return bracket.value.champion === teamName; }

          if (nextRound) {
            const isTeam1 = index % 2 === 0;
            const nextMatch = bracket.value[nextRound][nextIndex];
            return isTeam1 ? nextMatch.team1 === teamName : nextMatch.team2 === teamName;
          }
          return false;
        };

        const initDragToScroll = () => {
          const checkAndBindScroll = () => {
            const slider = document.getElementById('scroll-container');
            if (!slider) {
              setTimeout(checkAndBindScroll, 500);
              return;
            }
            let isDown = false, startX, scrollLeft;
            slider.addEventListener('mousedown', (e) => {
              isDown = true;
              slider.classList.add('cursor-grabbing');
              startX = e.pageX - slider.offsetLeft;
              scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('cursor-grabbing'); });
            slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('cursor-grabbing'); });
            slider.addEventListener('mousemove', (e) => {
              if (!isDown) return;
              e.preventDefault();
              const x = e.pageX - slider.offsetLeft;
              slider.scrollLeft = scrollLeft - ((x - startX) * 1.5);
            });
          };
          checkAndBindScroll();
        };

        return {
          groupsData, tabs, activeTab, selectedTeams, bracket, roundsKeys,
          canAccessTab, goToBagan, getOptions, handleChange, isWinner, resetData, getFlag
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
